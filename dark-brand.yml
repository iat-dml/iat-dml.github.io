meta:
  name:
    short: ZALF
    full: Leibniz Centre for Agricultural Landscape Research (ZALF)
  link:
    home: https://www.zalf.de/en/Pages/ZALF.aspx
    github: https://github.com/zalf-lse
    linkedin: https://www.linkedin.com/company/zalf
    twitter: https://twitter.com/ZALF_Muencheberg

logo:
  images:
    logo-zalf:
      path: assets/logos/logo-zalf.png
      alt: "ZALF – Leibniz Centre for Agricultural Landscape Research"
    logo-leibniz:
      path: assets/logos/logo-leibniz.png
      alt: "Leibniz Association"
    logo-iat:
      path: assets/logos/logo-IAT.png
      alt: "Innovation Center for Agricultural System Transformation"
    logo-DML:
      path: assets/logos/logo-DML-white-en.png
      alt: "Data and Modelling Infrastructure for Living Labs (DML)"
    logo-iat-zalf:
      path: assets/logos/logo-iat-zalf-white.png
      alt: "Innovation Center for Agricultural System Transformation & Leibniz Centre for Agricultural Landscape Research"
  medium: logo-iat-zalf
  large:  logo-iat-zalf
  small:  logo-iat-zalf

color:
  palette:
    green:           "#46A84F"
    green-light:     "#9EBC83"
    green-mid:       "#80BDBD"
    teal:            "#36AE6C"
    teal-dark:       "#356259"
    olive:           "#B1BE4D"
    sage:            "#657A4E"
    transfer:        "#458484"
    support:         "#2D6A4F"
    integration:     "#C18F59"
    slate:           "#465555"
    white:           "#FFFFFF"
    black:           "#0F1B18"   # ← teal-tinted near-black (was flat #1A1A1A)
    dark-surface:    "#162520"   # card / surface background in dark mode
    dark-border:     "#1F3530"   # border colour in dark mode
    paper:           "#F5F3EE"
    gray-light:      "#F5F5F5"
    gray:            "#6C6C6C"

  # Semantic assignments — note foreground/background are inverted vs. light
  foreground:  white
  background:  black            # ← #0F1B18 — richer than flat black
  primary:     teal             # brighter teal reads better on dark
  secondary:   teal
  tertiary:    green-mid
  success:     teal
  info:        green-mid
  warning:     olive
  danger:      "#E74C3C"
  light:       gray
  dark:        slate

typography:
  fonts:
    # Same font stack as light theme
    - family: "DM Serif Display"
      source: google
    - family: "DM Sans"
      source: google
    - family: "Segoe UI"
      source: system
    - family: "Segoe UI Mono"
      source: system

  # See light-brand.yml: bare family names are required so Quarto can emit
  # the Google Fonts @import. Fallback stacks live in scss/styles.scss.
  base:
    family: "DM Sans"
    weight: 400
    size: 1rem
    line-height: 1.65

  headings:
    family: "DM Serif Display"
    weight: 400
    color: green-light          # ← lighter shade reads well on dark background
    line-height: 1.15

  monospace:
    family: "Segoe UI Mono"
    weight: 400
    size: 0.9em

  monospace-inline:
    background-color: dark-surface

  link:
    color: green-light
    weight: 500
    decoration: underline
