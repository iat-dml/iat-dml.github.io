meta:
  name:
    short: ZALF
    full: Leibniz Centre for Agricultural Landscape Research (ZALF)
  link:
    home: https://www.zalf.de/en/Pages/ZALF.aspx
    github: https://github.com/zalf-lse
    linkedin: https://www.linkedin.com/company/zalf
    twitter: https://twitter.com/ZALF_Muencheberg

logo:
  images:
    logo-zalf:
      path: assets/logos/logo-zalf.png
      alt: "ZALF – Leibniz Centre for Agricultural Landscape Research"
    logo-leibniz:
      path: assets/logos/logo-leibniz.png
      alt: "Leibniz Association"
    logo-iat:
      path: assets/logos/logo-IAT.png
      alt: "Innovation Center for Agricultural System Transformation"
    logo-dmi:
      path: assets/logos/logo-dmi-white-en.png
      alt: "Data and Modelling Infrastructure for Living Labs (DMI)"
    logo-iat-zalf:
      path: assets/logos/logo-iat-zalf-white.png
      alt: "Innovation Center for Agricultural System Transformation & Leibniz Centre for Agricultural Landscape Research"
  medium: logo-iat-zalf
  large:  logo-iat-zalf
  small:  logo-iat-zalf

color:
  palette:
    # Primary greens
    green:           "#46A84F"   # Primary ZALF green
    green-light:     "#9EBC83"   # Light green
    green-mid:       "#80BDBD"   # Mid teal-green
    # Teal family
    teal:            "#36AE6C"   # ZALF teal / secondary green
    teal-dark:       "#356259"   # Dark teal
    # Accent
    olive:           "#B1BE4D"   # Olive / yellow-green
    sage:            "#657A4E"   # Sage green
    transfer:        "#458484"   # Blue colour for transfer activities (e.g. transfer page, transfer news)
    support:         "#2D6A4F"   # Dark green for support activities (e.g. support page, support news)
    integration:     "#C18F59"   # terracotta for integration activities (e.g. integration page, integration news)
    # Neutrals
    slate:           "#465555"   # Dark slate (text)
    white:           "#FFFFFF"
    black:           "#1A1A1A"
    gray-light:      "#F5F5F5"
    gray:            "#6C6C6C"
  # Semantic color assignments
  foreground:  slate
  background:  white
  primary:     teal-dark
  secondary:   teal
  tertiary:    teal
  success:     teal-dark
  info:        green-mid
  warning:     olive
  danger:      "#C0392B"
  light:       gray-light
  dark:        slate

typography:
  fonts:
    # Segoe UI is a Microsoft system font (Windows / Office).
    # On macOS/Linux it is not installed by default; the fallback stack
    # (system-ui → Helvetica Neue → Arial) keeps web/Shiny output clean.
    # In Typst the font is resolved from the local system or the
    # fonts/ directory of the Typst project, matching zalf-internal-theme.typ.
    - family: "Segoe UI"
      source: system
    - family: "Segoe UI Mono"
      source: system
  base:
    family: "Segoe UI, system-ui, Helvetica Neue, Arial, sans-serif"
    weight: 400
    size: 1.25rem 
    line-height: 1.5
  headings:
    # H1/H2/H3 use semibold Segoe UI filled with zalf-green in the Typst theme
    family: "Segoe UI, system-ui, Helvetica Neue, Arial, sans-serif"
    weight: 600
    color: teal-dark
    line-height: 1.25
  monospace:
    family: "Segoe UI Mono, ui-monospace, Consolas, monospace"
    weight: 400
    size: 0.9em
  monospace-inline:
    background-color: gray-light
  link:
    color: primary
    weight: 600
    decoration: underline
