meta:
  name:
    short: ZALF
    full: Leibniz Centre for Agricultural Landscape Research (ZALF)
  link:
    home: https://www.zalf.de/en/Pages/ZALF.aspx
    github: https://github.com/zalf-lse
    linkedin: https://www.linkedin.com/company/zalf
    twitter: https://twitter.com/ZALF_Muencheberg

logo:
  images:
    logo-zalf:
      path: assets/logos/logo-zalf.png
      alt: "ZALF – Leibniz Centre for Agricultural Landscape Research"
    logo-leibniz:
      path: assets/logos/logo-leibniz.png
      alt: "Leibniz Association"
    logo-iat:
      path: assets/logos/logo-IAT.png
      alt: "Innovation Center for Agricultural System Transformation"
    logo-dmi:
      path: assets/logos/logo-dmi-white-en.png
      alt: "Data and Modelling Infrastructure for Living Labs (DMI)"
    logo-iat-zalf:
      path: assets/logos/logo-iat-zalf-white.png
      alt: "Innovation Center for Agricultural System Transformation & Leibniz Centre for Agricultural Landscape Research"
  medium: logo-iat-zalf
  large:  logo-iat-zalf
  small:  logo-iat-zalf

color:
  palette:
    # Primary greens
    green:           "#46A84F"   # Primary ZALF green
    green-light:     "#9EBC83"   # Light green
    green-mid:       "#80BDBD"   # Mid teal-green
    # Teal family
    teal:            "#36AE6C"   # ZALF teal / secondary green
    teal-dark:       "#356259"   # Dark teal — primary brand colour
    # Accents
    olive:           "#B1BE4D"   # Olive / yellow-green
    sage:            "#657A4E"   # Sage green
    # Service colours
    transfer:        "#458484"   # Teal-blue for transfer activities
    support:         "#2D6A4F"   # Dark green for support activities
    integration:     "#C18F59"   # Terracotta for integration activities
    # Neutrals
    slate:           "#465555"   # Dark slate (text)
    white:           "#FFFFFF"
    black:           "#1A1A1A"
    paper:           "#F5F3EE"   # Warm off-white body background
    gray-light:      "#F5F5F5"
    gray:            "#6C6C6C"
  # Semantic assignments
  foreground:  slate
  background:  paper            # ← warm paper instead of pure white
  primary:     teal-dark
  secondary:   teal
  tertiary:    teal
  success:     teal-dark
  info:        green-mid
  warning:     olive
  danger:      "#C0392B"
  light:       paper
  dark:        slate

typography:
  fonts:
    # DM Serif Display — editorial display font for headings
    - family: "DM Serif Display"
      source: google
    # DM Sans — clean geometric sans for body text and UI
    - family: "DM Sans"
      source: google
    # Segoe UI kept as a system fallback if needed
    - family: "Segoe UI"
      source: system
    - family: "Segoe UI Mono"
      source: system

  # NOTE: brand.yml requires a bare primary family name here so Quarto can
  # match it against the `fonts:` array above and emit the Google Fonts
  # @import. A comma-separated fallback stack will silently fail to import.
  # Fallback stacks are layered on in scss/styles.scss instead.
  base:
    family: "DM Sans"
    weight: 400
    size: 1rem
    line-height: 1.65

  headings:
    # DM Serif Display gives an editorial, academic feel to h1/h2.
    # Weight 400 is the only weight available for this typeface.
    family: "DM Serif Display"
    weight: 400
    color: teal-dark
    line-height: 1.15

  monospace:
    family: "Segoe UI Mono"
    weight: 400
    size: 0.9em

  monospace-inline:
    background-color: gray-light

  link:
    color: primary
    weight: 500
    decoration: underline
